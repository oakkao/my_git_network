name: Refresh Friend Chain

on:
  schedule:
    # Runs at 00:00 UTC on Sunday (0), Tuesday (2), and Thursday (4)
    - cron: "0 0 * * 0,2,4"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install networkx requests

      - name: Collect graph data
        run: python ./src/main.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Analyse & find chain
        run: python ./analysis/analyze.py --root oakkao

      - name: Generate self-contained SVG (avatars embedded as base64)
        run: python ./analysis/generate_svg.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs
          git commit -m "chore: refresh friend chain [skip ci]" || echo "Nothing to commit"
          git push