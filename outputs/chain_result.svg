<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="680" height="210" viewBox="0 0 680 210">

  <!-- defs: clip path for round avatars -->
  <defs>
    <clipPath id="cp0"><circle cx="85" cy="70" r="30"/></clipPath>
    <clipPath id="cp1"><circle cx="255" cy="70" r="30"/></clipPath>
    <clipPath id="cp2"><circle cx="425" cy="70" r="30"/></clipPath>
    <clipPath id="cp3"><circle cx="595" cy="70" r="30"/></clipPath>
  </defs>

  <!-- background -->
  <rect width="680" height="210" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- connectors -->
  <line x1="130" y1="70" x2="200" y2="70"
        stroke="#2ea043" stroke-width="2" stroke-dasharray="4 2"/>
  <polygon points="200,65 210,70 200,75"
           fill="#2ea043"/>
  <text x="170" y="60" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#2ea043">x3</text>
  <line x1="300" y1="70" x2="370" y2="70"
        stroke="#2ea043" stroke-width="2" stroke-dasharray="4 2"/>
  <polygon points="370,65 380,70 370,75"
           fill="#2ea043"/>
  <text x="340" y="60" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#2ea043">x17</text>
  <line x1="470" y1="70" x2="540" y2="70"
        stroke="#2ea043" stroke-width="2" stroke-dasharray="4 2"/>
  <polygon points="540,65 550,70 540,75"
           fill="#2ea043"/>
  <text x="510" y="60" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#2ea043">x2</text>

  <!-- nodes -->
  <!-- node: pannxe -->
  <circle cx="85" cy="70" r="32"
          fill="#30363d"/>
  <a href="https://github.com/pannxe" target="_blank">
    <image href="https://avatars.githubusercontent.com/pannxe?s=120"
           x="55" y="40"
           width="60" height="60"
           clip-path="url(#cp0)" preserveAspectRatio="xMidYMid slice"/>
  </a>
  <a href="https://github.com/pannxe" target="_blank">
    <text x="85" y="116" text-anchor="middle"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11"
          fill="#58a6ff">pannxe</text>
  </a>
  <!-- node: Anon-136 -->
  <circle cx="255" cy="70" r="32"
          fill="#30363d"/>
  <a href="https://github.com/Anon-136" target="_blank">
    <image href="https://avatars.githubusercontent.com/Anon-136?s=120"
           x="225" y="40"
           width="60" height="60"
           clip-path="url(#cp1)" preserveAspectRatio="xMidYMid slice"/>
  </a>
  <a href="https://github.com/Anon-136" target="_blank">
    <text x="255" y="116" text-anchor="middle"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11"
          fill="#58a6ff">Anon-136</text>
  </a>
  <!-- node: Nacnano -->
  <circle cx="425" cy="70" r="32"
          fill="#30363d"/>
  <a href="https://github.com/Nacnano" target="_blank">
    <image href="https://avatars.githubusercontent.com/Nacnano?s=120"
           x="395" y="40"
           width="60" height="60"
           clip-path="url(#cp2)" preserveAspectRatio="xMidYMid slice"/>
  </a>
  <a href="https://github.com/Nacnano" target="_blank">
    <text x="425" y="116" text-anchor="middle"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11"
          fill="#58a6ff">Nacnano</text>
  </a>
  <!-- node: oakkao -->
  <circle cx="595" cy="70" r="32"
          fill="#2ea043"/>
  <a href="https://github.com/oakkao" target="_blank">
    <image href="https://avatars.githubusercontent.com/oakkao?s=120"
           x="565" y="40"
           width="60" height="60"
           clip-path="url(#cp3)" preserveAspectRatio="xMidYMid slice"/>
  </a>
  <a href="https://github.com/oakkao" target="_blank">
    <text x="595" y="116" text-anchor="middle"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11"
          fill="#2ea043">oakkao</text>
  </a>
  <rect x="607" y="86" width="24" height="12"
        rx="6" fill="#2ea043"/>
  <text x="619" y="96" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="7" font-weight="bold"
        fill="white">YOU</text>

  <text x="340" y="176" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#8b949e">pannxe  ->  3 hops  ->  oakkao</text>
  <text x="340" y="194" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#8b949e">Edge weight = shared mutual friends + 1</text>
</svg>