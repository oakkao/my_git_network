<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GitHub Friend Chain</title>
<style>
  /* ── reset & tokens ──────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    #30363d;
    --accent:    #238636;
    --accent-hi: #2ea043;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --link:      #58a6ff;
    --avatar-sz: 72px;
    --node-gap:  120px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 64px;
  }

  /* ── header ─────────────────────────────────────────────────── */
  header { text-align: center; margin-bottom: 40px; }
  header h1 { font-size: 1.4rem; font-weight: 600; color: var(--text); }
  header p  { font-size: 0.85rem; color: var(--muted); margin-top: 6px; }

  /* ── card ────────────────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 40px 36px;
    width: 100%;
    max-width: 900px;
  }

  /* ── chain row ───────────────────────────────────────────────── */
  .chain {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0;
    justify-content: center;
  }

  /* ── node ────────────────────────────────────────────────────── */
  .node {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .avatar-wrap {
    position: relative;
    width: var(--avatar-sz);
    height: var(--avatar-sz);
  }

  .avatar-wrap img {
    width: var(--avatar-sz);
    height: var(--avatar-sz);
    border-radius: 50%;
    border: 2px solid var(--border);
    display: block;
    background: var(--border);   /* placeholder while loading */
    object-fit: cover;
  }

  /* "YOU" badge on root node */
  .badge-you {
    position: absolute;
    bottom: -4px;
    right: -4px;
    background: var(--accent);
    color: #fff;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 20px;
    border: 2px solid var(--surface);
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .node-label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--link);
    text-decoration: none;
    text-align: center;
    max-width: 100px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .node-label:hover { text-decoration: underline; }

  /* ── connector ───────────────────────────────────────────────── */
  .connector {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 0 8px;
    flex-shrink: 0;
  }

  .connector-line {
    width: 48px;
    height: 2px;
    background: linear-gradient(90deg, var(--border), var(--accent-hi), var(--border));
    position: relative;
  }

  /* arrowhead */
  .connector-line::after {
    content: "";
    position: absolute;
    right: -1px;
    top: 50%;
    transform: translateY(-50%);
    border: 5px solid transparent;
    border-left: 8px solid var(--accent-hi);
  }

  .connector-weight {
    font-size: 0.65rem;
    color: var(--accent-hi);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    white-space: nowrap;
  }

  /* ── meta row ────────────────────────────────────────────────── */
  .meta {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    justify-content: center;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .meta-value { font-size: 1.25rem; font-weight: 700; color: var(--text); }
  .meta-label { font-size: 0.72rem; color: var(--muted); }

  /* ── weight legend ───────────────────────────────────────────── */
  .legend {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 16px;
    text-align: center;
    line-height: 1.6;
  }

  /* ── load / error states ─────────────────────────────────────── */
  #status {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 20px;
    text-align: center;
  }

  /* ── responsive wrap on small screens ───────────────────────── */
  @media (max-width: 600px) {
    .connector-line { width: 28px; }
    :root { --avatar-sz: 56px; }
    .card { padding: 24px 16px; }
  }
</style>
</head>
<body>

<header>
  <h1>🔗 GitHub Friend Chain</h1>
  <p>How does this person connect back to me?</p>
</header>

<div class="card" id="card">
  <div id="status">Loading chain_result.json …</div>
</div>

<script>
// ---------------------------------------------------------------------------
// Config — set DATA_URL to your raw GitHub URL once uploaded, or keep "."
// for local testing (serve with: python -m http.server)
// ---------------------------------------------------------------------------
const DATA_URL = "chain_result.json";

// ---------------------------------------------------------------------------
// GitHub avatar helper
// ---------------------------------------------------------------------------
function avatarUrl(login) {
  return `https://avatars.githubusercontent.com/${login}?s=144`;
}

function profileUrl(login) {
  return `https://github.com/${login}`;
}

// ---------------------------------------------------------------------------
// Render
// ---------------------------------------------------------------------------
function renderChain(data) {
  const card = document.getElementById("card");
  card.innerHTML = "";

  // ── chain row ──
  const chainEl = document.createElement("div");
  chainEl.className = "chain";

  data.nodes.forEach((login, idx) => {
    // node
    const node = document.createElement("div");
    node.className = "node";

    const wrap = document.createElement("div");
    wrap.className = "avatar-wrap";

    const img = document.createElement("img");
    img.src = avatarUrl(login);
    img.alt = login;
    img.loading = "lazy";
    wrap.appendChild(img);

    if (login === data.root) {
      const badge = document.createElement("span");
      badge.className = "badge-you";
      badge.textContent = "you";
      wrap.appendChild(badge);
    }
    node.appendChild(wrap);

    const label = document.createElement("a");
    label.className = "node-label";
    label.href = profileUrl(login);
    label.target = "_blank";
    label.rel = "noopener noreferrer";
    label.title = login;
    label.textContent = login;
    node.appendChild(label);

    chainEl.appendChild(node);

    // connector (not after last node)
    if (idx < data.edges.length) {
      const edge = data.edges[idx];
      const conn = document.createElement("div");
      conn.className = "connector";

      const line = document.createElement("div");
      line.className = "connector-line";
      conn.appendChild(line);

      const wt = document.createElement("span");
      wt.className = "connector-weight";
      wt.textContent = `x${edge.weight}`;
      conn.appendChild(wt);

      chainEl.appendChild(conn);
    }
  });

  card.appendChild(chainEl);

  // ── meta row ──
  const meta = document.createElement("div");
  meta.className = "meta";

  const items = [
    { value: data.hops,   label: "hops" },
    { value: data.target, label: "starts from" },
    { value: data.root,   label: "ends at" },
  ];

  items.forEach(({ value, label }) => {
    const item = document.createElement("div");
    item.className = "meta-item";
    item.innerHTML = `<span class="meta-value">${value}</span>
                      <span class="meta-label">${label}</span>`;
    meta.appendChild(item);
  });
  card.appendChild(meta);

  // ── legend ──
  const legend = document.createElement("p");
  legend.className = "legend";
  legend.textContent =
    "Edge weight = shared mutual friends + 1, Higher = stronger connection";
  card.appendChild(legend);

  const legend2 = document.createElement("p");
  legend2.className = "legend";
  legend2.textContent =
    "A friendship relation only counts when A follows B and vice versa.";
  card.appendChild(legend2);
}

// ---------------------------------------------------------------------------
// Fetch data
// ---------------------------------------------------------------------------
fetch(DATA_URL)
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  })
  .then(data => {
    renderChain(data);
  })
  .catch(err => {
    document.getElementById("status").innerHTML =
      `<strong style="color:#f85149">Failed to load chain_result.json</strong><br>
       <span style="font-size:.8rem">Run <code>python analyze.py</code> first, then serve this folder.</span><br>
       <span style="font-size:.75rem;color:#8b949e">${err}</span>`;
  });
</script>
</body>
</html>
